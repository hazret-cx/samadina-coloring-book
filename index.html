<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Samadina Colors">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#C8102E">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Samadina Colors ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    :root {
      --red: #C8102E;
      --gold: #FFD700;
      --dark: #1A0505;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Nunito', sans-serif;
      touch-action: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(160deg, #D41230 0%, #9A0A22 100%);
      padding: 10px 16px 12px;
      text-align: center;
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 10;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 5px;
      background: repeating-linear-gradient(90deg,
        #FFD700 0px, #FFD700 10px,
        #C8102E 10px, #C8102E 20px,
        #1A1A1A 20px, #1A1A1A 30px,
        #C8102E 30px, #C8102E 40px,
        #FFD700 40px, #FFD700 50px,
        #1A1A1A 50px, #1A1A1A 60px
      );
    }
    .header-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(18px, 5vw, 26px);
      color: var(--gold);
      text-shadow: 2px 2px 6px rgba(0,0,0,0.5), 0 0 30px rgba(255,215,0,0.4);
      letter-spacing: 1px;
    }
    .header-sub {
      font-size: 10px;
      color: rgba(255,215,0,0.75);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── PAGE INDICATOR ── */
    .page-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 6px 0 2px;
      flex-shrink: 0;
    }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: rgba(255,215,0,0.25);
      border: 1.5px solid rgba(255,215,0,0.4);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .dot.active {
      background: var(--gold);
      transform: scale(1.4);
      border-color: var(--gold);
      box-shadow: 0 0 8px rgba(255,215,0,0.6);
    }
    .page-label {
      font-family: 'Fredoka One', cursive;
      font-size: 13px;
      color: rgba(255,215,0,0.7);
      text-align: center;
      letter-spacing: 0.5px;
      padding: 0 0 4px;
      flex-shrink: 0;
    }

    /* ── BOOK ── */
    .book-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }
    .pages-track {
      display: flex;
      width: 300%;
      height: 100%;
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }
    .page-slide {
      width: 33.333%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
    }
    .coloring-card {
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.6),
        0 2px 8px rgba(255,215,0,0.15),
        inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .coloring-card svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Colorable SVG regions */
    [data-c] {
      fill: white;
      stroke: #2A1A1A;
      stroke-width: 2;
      stroke-linejoin: round;
      stroke-linecap: round;
      cursor: pointer;
      transition: filter 0.1s;
    }
    [data-c]:active { filter: brightness(0.85); }

    /* Non-colorable decoration */
    .deco { pointer-events: none; }

    /* Swipe hint */
    .swipe-hint {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 28px;
      color: rgba(255,215,0,0.5);
      pointer-events: none;
      animation: hint-bounce 1.8s ease-in-out infinite;
    }
    @keyframes hint-bounce {
      0%,100% { opacity:0.4; transform:translateY(-50%) translateX(0); }
      50% { opacity:0.9; transform:translateY(-50%) translateX(-6px); }
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 5px 12px 3px;
      flex-shrink: 0;
    }
    .btn {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,215,0,0.35);
      color: var(--gold);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 12px;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:active {
      background: rgba(255,215,0,0.2);
      transform: scale(0.94);
    }

    /* ── PALETTE ── */
    .palette {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 7px;
      padding: 6px 12px 10px;
      flex-shrink: 0;
    }
    .swatch {
      width: 34px; height: 34px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      position: relative;
    }
    .swatch:active { transform: scale(0.88); }
    .swatch.active {
      border-color: white;
      transform: scale(1.2);
      box-shadow: 0 4px 14px rgba(255,255,255,0.45);
    }

    /* ── SPARKLE ── */
    .sparkle {
      position: fixed;
      font-size: 22px;
      pointer-events: none;
      z-index: 999;
      animation: pop 0.55s ease-out forwards;
    }
    @keyframes pop {
      0%   { transform: scale(0) rotate(-30deg); opacity: 1; }
      60%  { transform: scale(1.3) rotate(20deg); opacity: 1; }
      100% { transform: scale(0) rotate(60deg); opacity: 0; }
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 90px; left: 50%;
      transform: translateX(-50%);
      background: rgba(10,0,0,0.85);
      color: var(--gold);
      font-weight: 700;
      font-size: 13px;
      padding: 10px 22px;
      border-radius: 22px;
      border: 1px solid rgba(255,215,0,0.3);
      backdrop-filter: blur(12px);
      z-index: 1000;
      animation: fadein 0.3s ease;
    }
    @keyframes fadein { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  </style>
</head>

    <button class="btn" id="clearBtn">🗑 Clear</button>
    <button class="btn" id="saveBtn">💾 Save</button>
  </div>

  <!-- Color palette -->
  <div class="palette" id="palette"></div>

</div><!-- end app -->

<script>
  // ── Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // ── Colors (Albanian-themed palette)
  const COLORS = [
    '#E8102E', // Albanian Red
    '#FF6B35', // Sunset Orange
    '#FFD700', // Gold
    '#F4C430', // Warm Yellow
    '#2D6A4F', // Forest Green
    '#52B788', // Meadow Green
    '#74C0FC', // Sky Blue
    '#1971C2', // Deep Blue
    '#9B59B6', // Royal Purple
    '#FF85A1', // Blossom Pink
    '#8B5E3C', // Earth Brown
    '#1A1A1A', // Ink Black
  ];

  const PAGE_TITLES = ['Mountain Village 🏔️', 'Albanian Eagle 🦅', 'Folk Dancer 💃'];

  let currentColor = COLORS[0];
  let history = [];
  let currentPage = 0;
  const TOTAL = 3;

  // ── Build palette
  const paletteEl = document.getElementById('palette');
  let swatches = [];
  COLORS.forEach((hex, i) => {
    const el = document.createElement('div');
    el.className = 'swatch' + (i === 0 ? ' active' : '');
    el.style.background = hex;
    el.addEventListener('click', () => {
      currentColor = hex;
      swatches.forEach(s => s.classList.remove('active'));
      el.classList.add('active');
    });
    paletteEl.appendChild(el);
    swatches.push(el);
  });

  // ── Coloring mechanic
  function initColoring() {
    document.querySelectorAll('[data-c]').forEach(el => {
      if (!el.style.fill) el.style.fill = 'white';

      const paint = (e) => {
        e.preventDefault();
        e.stopPropagation();
        const prev = el.style.fill;
        el.style.fill = currentColor;
        history.push({ el, prev });
        if (history.length > 80) history.shift();
        spawnSparkle(e);
        autoSave();
      };

      el.addEventListener('click', paint);
      el.addEventListener('touchend', paint, { passive: false });
    });
  }

  // ── Sparkle
  function spawnSparkle(e) {
    const icons = ['✨','⭐','🌟','💫','🎨'];
    const sp = document.createElement('div');
    sp.className = 'sparkle';
    sp.textContent = icons[Math.floor(Math.random() * icons.length)];
    const cx = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const cy = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    sp.style.left = (cx - 12) + 'px';
    sp.style.top  = (cy - 12) + 'px';
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 600);
  }

  // ── Toolbar buttons
  document.getElementById('undoBtn').addEventListener('click', () => {
    if (!history.length) return;
    const { el, prev } = history.pop();
    el.style.fill = prev;
    autoSave();
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    const slide = document.querySelectorAll('.page-slide')[currentPage];
    slide.querySelectorAll('[data-c]').forEach(el => { el.style.fill = 'white'; });
    autoSave();
    toast('Page cleared ✨');
  });

  document.getElementById('saveBtn').addEventListener('click', () => {
    autoSave();
    toast('💾 Progress saved!');
  });

  // ── Page navigation
  const track    = document.getElementById('track');
  const dots     = document.querySelectorAll('.dot');
  const labelEl  = document.getElementById('pageLabel');
  const hintEl   = document.getElementById('swipeHint');

  function goTo(n) {
    currentPage = Math.max(0, Math.min(TOTAL - 1, n));
    track.style.transform = `translateX(-${currentPage * 33.333}%)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === currentPage));
    labelEl.textContent = PAGE_TITLES[currentPage];
    hintEl.style.opacity = currentPage === TOTAL - 1 ? '0' : '1';
  }

  // ── Swipe
  let tx = 0, ty = 0, swiping = false;
  const bookEl = document.getElementById('bookWrap');

  bookEl.addEventListener('touchstart', e => {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
    swiping = false;
  }, { passive: true });

  bookEl.addEventListener('touchmove', e => {
    const dx = Math.abs(e.touches[0].clientX - tx);
    const dy = Math.abs(e.touches[0].clientY - ty);
    if (dx > dy && dx > 12) swiping = true;
  }, { passive: true });

  bookEl.addEventListener('touchend', e => {
    if (!swiping) return;
    const diff = tx - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 45) goTo(diff > 0 ? currentPage + 1 : currentPage - 1);
  }, { passive: true });

  // ── Persist state
  function autoSave() {
    const state = {};
    document.querySelectorAll('[data-c]').forEach(el => {
      if (el.id && el.style.fill && el.style.fill !== 'white' && el.style.fill !== '') {
        state[el.id] = el.style.fill;
      }
    });
    try { localStorage.setItem('samadina-state', JSON.stringify(state)); } catch(e) {}
  }

  function loadState() {
    try {
      const state = JSON.parse(localStorage.getItem('samadina-state') || '{}');
      Object.entries(state).forEach(([id, color]) => {
        const el = document.getElementById(id);
        if (el) el.style.fill = color;
      });
    } catch(e) {}
  }

  // ── Toast
  function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2200);
  }

  // ── Init
  initColoring();
  loadState();
</script>
