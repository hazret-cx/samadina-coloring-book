<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Colours Of Albania">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#F5ECD7">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Colours Of Albania</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/book.css">
  <link rel="stylesheet" href="css/palette.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
<div class="app">

  <!-- ── Book Cover (first launch only) ── -->
  <div id="cover" class="cover hidden">
    <div class="cover-card">
      <span class="cover-eagle">🦅</span>
      <div class="cover-title">Colours Of Albania</div>
      <div class="cover-sub">by Samadina Art</div>
      <div class="cover-divider"></div>
      <div class="cover-tap">Tap to begin</div>
    </div>
  </div>

  <!-- ── Main Book ── -->
  <div class="book-wrap" id="bookWrap">

    <!-- Page scene (3D curl stage) -->
    <div class="page-scene" id="pageScene">
      <div class="coloring-card" id="coloringCard">

        <!-- Page arrival title -->
        <div class="page-title" id="pageTitle"></div>

        <!-- Bloom overlay (above page SVG, below paper texture) -->
        <svg id="bloomOverlay"
             xmlns="http://www.w3.org/2000/svg"
             style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3;">
          <defs></defs>
        </svg>

      </div>
    </div>

    <!-- First-launch hint -->
    <div id="hint" class="hint hidden">
      <div class="hint-hand">👆</div>
    </div>

  </div>

  <!-- ── Page Dots ── -->
  <div class="page-dots">
    <div class="dot active" data-page="0"></div>
    <div class="dot" data-page="1"></div>
    <div class="dot" data-page="2"></div>
  </div>

  <!-- ── Floating Palette ── -->
  <div class="palette-wrap" id="paletteWrap">
    <div class="palette-tray" id="paletteTray"></div>
  </div>

  <!-- ── Colour indicator hairline ── -->
  <div class="colour-line" id="colourLine"></div>

</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
